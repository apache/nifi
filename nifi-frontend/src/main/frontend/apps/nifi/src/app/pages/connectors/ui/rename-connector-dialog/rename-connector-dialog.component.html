<h2 mat-dialog-title>Rename Connector</h2>
<form class="rename-connector-form" [formGroup]="renameForm">
    <context-error-banner [context]="ErrorContextKey.CONNECTOR_RENAME_DIALOG"></context-error-banner>
    <mat-dialog-content>
        <div class="flex flex-col">
            <mat-form-field class="w-full">
                <mat-label>Name</mat-label>
                <input
                    matInput
                    formControlName="name"
                    type="text"
                    cdkFocusInitial
                    data-qa="rename-connector-name-input" />
                @if (renameForm.get('name')?.invalid && renameForm.get('name')?.touched) {
                    <mat-error>{{ getNameErrorMessage() }}</mat-error>
                }
            </mat-form-field>
        </div>
    </mat-dialog-content>
    @if ({ value: (saving$ | async)! }; as saving) {
        <mat-dialog-actions align="end">
            <button
                mat-stroked-button
                mat-dialog-close
                data-qa="rename-connector-cancel-button"
                (click)="cancelClicked()">
                Cancel
            </button>
            <button
                [disabled]="renameForm.invalid || saving.value || renameForm.pending"
                data-qa="rename-connector-submit-button"
                (click)="renameClicked()"
                mat-flat-button
                color="primary">
                <span *nifiSpinner="saving.value">Rename</span>
            </button>
        </mat-dialog-actions>
    }
</form>
