@if (loadingStatus() === 'error') {
    <div
        class="flex flex-col flex-1 items-center justify-center p-8 gap-4 tertiary-color"
        data-qa="connector-resolve-error">
        <i class="fa fa-warning text-2xl" aria-hidden="true"></i>
        <p>{{ errorMessage() }}</p>
        <button mat-flat-button data-qa="return-to-connectors" (click)="returnToConnectorListing()">
            Return to Connectors
        </button>
    </div>
} @else {
    <div class="flex flex-col h-full items-center justify-center" *nifiSpinner="true"></div>
}
