<h2 mat-dialog-title>Backlog</h2>
<mat-dialog-content>
    <div class="flex flex-col gap-y-4">
        @if (!complete) {
            <div class="flex flex-col gap-y-2">
                <div class="text-base">Determining backlog...</div>
                <mat-progress-bar mode="indeterminate"></mat-progress-bar>
            </div>
        } @else if (errorMessage) {
            <div class="text-base break-words">{{ errorMessage }}</div>
        } @else {
            <div class="listing-table backlog-table">
                <table mat-table [dataSource]="rows">
                    <ng-container matColumnDef="measurement">
                        <th mat-header-cell *matHeaderCellDef class="backlog-measurement-column">Measurement</th>
                        <td mat-cell *matCellDef="let row" class="backlog-measurement-column">{{ row.label }}</td>
                    </ng-container>

                    <ng-container matColumnDef="value">
                        <th mat-header-cell *matHeaderCellDef class="backlog-value-column">Value</th>
                        <td mat-cell *matCellDef="let row" class="backlog-value-column">
                            @if (row.value === null) {
                                <span class="unset neutral-color">No value set</span>
                            } @else if (row.tooltip) {
                                <span [matTooltip]="row.tooltip" matTooltipPosition="above">{{ row.value }}</span>
                            } @else {
                                <span>{{ row.value }}</span>
                            }
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
                </table>
            </div>
        }
    </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
    @if (!complete) {
        <button type="button" mat-button (click)="cancel()">Cancel</button>
    } @else {
        <button type="button" mat-button mat-dialog-close>OK</button>
    }
</mat-dialog-actions>
