@if (connectorsListingState$ | async; as connectorsListingState) {
    @if (isInitialLoading(connectorsListingState)) {
        <div>
            <ngx-skeleton-loader count="3"></ngx-skeleton-loader>
        </div>
    } @else {
        @if (currentUser$ | async; as currentUser) {
            <div class="flex flex-col h-full gap-y-2">
                <context-error-banner [context]="ErrorContextKey.CONNECTORS"></context-error-banner>
                @if (currentUser.connectorsPermissions.canWrite) {
                    <div class="flex justify-end">
                        <button
                            mat-icon-button
                            class="primary-icon-button"
                            data-qa="add-connector-button"
                            (click)="openNewConnectorDialog()">
                            <i class="fa fa-plus"></i>
                        </button>
                    </div>
                }
                <div class="flex-1">
                    <connector-table
                        [connectors]="connectorsListingState.connectors"
                        [selectedConnectorId]="(selectedConnectorId$ | async)!"
                        [flowConfiguration]="(flowConfiguration$ | async)!"
                        [currentUser]="currentUser"
                        (viewConnector)="viewConnector($event)"
                        (viewDetails)="viewDetails($event)"
                        (configureConnector)="configureConnector($event)"
                        (renameConnector)="renameConnector($event)"
                        (selectConnector)="selectConnector($event)"
                        (startConnector)="startConnector($event)"
                        (stopConnector)="stopConnector($event)"
                        (deleteConnector)="deleteConnector($event)"
                        (discardConnectorConfig)="discardConnectorConfig($event)"
                        (drainConnector)="drainConnector($event)"
                        (cancelDrainConnector)="cancelDrainConnector($event)"
                        (purgeConnector)="purgeConnector($event)"
                        (manageAccessPolicies)="navigateToManageAccessPolicies($event)"
                        (viewDocumentation)="viewDocumentation($event)"></connector-table>
                </div>
                <div class="flex justify-between">
                    <div class="text-sm flex items-center gap-x-2">
                        <button mat-icon-button class="primary-icon-button" (click)="refreshConnectorListing()">
                            <i class="fa fa-refresh" [class.fa-spin]="connectorsListingState.status === 'loading'"></i>
                        </button>
                        <div>Last updated:</div>
                        <div class="tertiary-color font-medium">
                            {{ connectorsListingState.loadedTimestamp }}
                        </div>
                    </div>
                </div>
            </div>
        }
    }
}
