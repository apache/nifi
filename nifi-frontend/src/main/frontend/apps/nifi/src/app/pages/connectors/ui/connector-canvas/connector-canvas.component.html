<div class="flex flex-col h-full">
    <header class="nifi-header">
        <navigation></navigation>
    </header>
    <div class="relative flex-1 min-h-0">
        @if ((hasError$ | async) === false) {
            <reusable-canvas
                [labels]="(labels$ | async) || []"
                [processors]="(processors$ | async) || []"
                [funnels]="(funnels$ | async) || []"
                [ports]="(allPorts$ | async) || []"
                [remoteProcessGroups]="(remoteProcessGroups$ | async) || []"
                [processGroups]="(processGroups$ | async) || []"
                [connections]="(connections$ | async) || []"
                [previewExtensions]="(previewExtensions$ | async) || []"
                [registryClients]="(registryClients$ | async) || []"
                [processGroupId]="currentProcessGroupId"
                [selectedComponentIds]="selectedComponentIds"
                [dataReady]="(dataReady$ | async) ?? false"
                [skipInitialCenter]="skipTransform()"
                (selectComponents)="onSelectComponents($event)"
                (deselectAll)="onDeselectAll()"
                (initialized)="onCanvasInitialized()"
                (transformChange)="onTransformChange($event)"
                (processGroupDoubleClick)="onProcessGroupDoubleClick($event)">
            </reusable-canvas>
        }
        @if ((hasError$ | async) === true) {
            <div
                class="flex flex-col h-full items-center justify-center p-8 gap-4 tertiary-color"
                data-qa="not-found-state">
                <i class="fa fa-warning text-2xl" aria-hidden="true"></i>
                <p>Connector not found.</p>
                <button mat-flat-button (click)="returnToConnectorListing()">Return to Connectors</button>
            </div>
        }
    </div>
</div>
