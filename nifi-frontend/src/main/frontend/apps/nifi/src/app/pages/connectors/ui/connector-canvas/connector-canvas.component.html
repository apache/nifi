<div class="flex flex-col h-full">
    <header class="nifi-header">
        <navigation></navigation>
    </header>
    <connector-canvas-header-bar
        [connectorId]="currentConnectorId"
        [selectedComponentId]="selectedComponentIds.length === 1 ? selectedComponentIds[0] : null"
        [graphControlsOpen]="graphControlsOpen"
        (backToConnectors)="returnToConnectorListing()"
        (goToComponent)="onSearchGoToComponent($event)"
        (toggleGraphControls)="toggleGraphControls()">
    </connector-canvas-header-bar>
    <div class="relative flex-1 min-h-0">
        <mat-sidenav-container class="h-full">
            <mat-sidenav disableClose="true" mode="side" [opened]="graphControlsOpen" position="start">
                <connector-graph-controls [connectorEntity]="connectorEntity()" [entitySaving]="entitySaving()">
                </connector-graph-controls>
            </mat-sidenav>
            <mat-sidenav-content>
                <div class="relative h-full">
                    <context-error-banner
                        class="canvas-error-banner absolute top-4 left-4 right-4 z-10"
                        [context]="ErrorContextKey.CONNECTOR_CANVAS">
                    </context-error-banner>
                    @if ((hasError$ | async) === false) {
                        <reusable-canvas
                            [labels]="(labels$ | async) || []"
                            [processors]="(processors$ | async) || []"
                            [funnels]="(funnels$ | async) || []"
                            [ports]="(allPorts$ | async) || []"
                            [remoteProcessGroups]="(remoteProcessGroups$ | async) || []"
                            [processGroups]="(processGroups$ | async) || []"
                            [connections]="(connections$ | async) || []"
                            [previewExtensions]="(previewExtensions$ | async) || []"
                            [registryClients]="(registryClients$ | async) || []"
                            [processGroupId]="currentProcessGroupId"
                            [selectedComponentIds]="selectedComponentIds"
                            [dataReady]="(dataReady$ | async) ?? false"
                            [skipInitialCenter]="skipTransform()"
                            (selectComponents)="onSelectComponents($event)"
                            (deselectAll)="onDeselectAll()"
                            (initialized)="onCanvasInitialized()"
                            (transformChange)="onTransformChange($event)"
                            (processGroupDoubleClick)="onProcessGroupDoubleClick($event)"
                            [menuProvider]="contextMenuProvider"
                            (contextMenuOpened)="onContextMenuOpened($event)">
                        </reusable-canvas>
                    }
                    @if ((hasError$ | async) === true) {
                        <div
                            class="flex flex-col h-full items-center justify-center p-8 gap-4 tertiary-color"
                            data-qa="not-found-state">
                            <i class="fa fa-warning text-2xl" aria-hidden="true"></i>
                            <p>Connector not found.</p>
                            <button mat-flat-button (click)="returnToConnectorListing()">Return to Connectors</button>
                        </div>
                    }
                </div>
            </mat-sidenav-content>
        </mat-sidenav-container>
    </div>
    <connector-canvas-footer [connectorId]="currentConnectorId"></connector-canvas-footer>
</div>
