<div class="wizard-stepper flex flex-1">
    <div class="wizard-stepper-header-wrapper flex flex-col gap-y-2 shrink-0 px-4 py-4">
        @for (step of steps; track step) {
            <div
                class="mat-step"
                [class.step-active]="selectedIndex === $index"
                [class.step-disabled]="stepIsDisabled(step)">
                <ng-container [ngTemplateOutlet]="stepTemplate" [ngTemplateOutletContext]="{ step, i: $index }" />
            </div>
        }
    </div>
    <div class="wizard-stepper-content-wrapper h-full w-full flex">
        @for (step of steps; track step) {
            @if (selectedIndex === $index) {
                <div
                    class="wizard-stepper-content w-full overflow-hidden"
                    #animatedContainer
                    role="tabpanel"
                    [id]="_getStepContentId($index)"
                    [attr.aria-labelledby]="_getStepLabelId($index)">
                    <div class="mat-vertical-content h-full w-full">
                        <ng-container [ngTemplateOutlet]="step.content" />
                    </div>
                </div>
            }
        }
    </div>
</div>

<!-- Common step templating -->
<ng-template let-step="step" let-i="i" #stepTemplate>
    <mat-step-header
        [class.mat-horizontal-stepper-header]="orientation === 'horizontal'"
        [class.mat-vertical-stepper-header]="orientation === 'vertical'"
        (click)="onHeaderClick(step)"
        (keydown)="_onKeydown($event)"
        [tabIndex]="_getFocusIndex() === i ? 0 : -1"
        [id]="_getStepLabelId(i)"
        [attr.aria-posinset]="i + 1"
        [attr.aria-setsize]="steps.length"
        [attr.aria-controls]="_getStepContentId(i)"
        [attr.aria-selected]="selectedIndex === i"
        [attr.aria-label]="step.ariaLabel || null"
        [attr.aria-labelledby]="!step.ariaLabel && step.ariaLabelledby ? step.ariaLabelledby : null"
        [attr.aria-disabled]="stepIsDisabled(step) ? true : null"
        [index]="i"
        [label]="step.stepLabel || step.label"
        [state]="computeState(i, step)"
        [selected]="selectedIndex === i"
        [optional]="step.optional"
        [errorMessage]="step.errorMessage"
        [iconOverrides]="_iconOverrides"
        [color]="step.color || color" />
</ng-template>
