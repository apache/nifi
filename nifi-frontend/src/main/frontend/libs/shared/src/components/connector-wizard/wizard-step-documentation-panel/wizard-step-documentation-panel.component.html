<div class="flex flex-col h-full border-l">
    <div class="flex items-center justify-between p-4 border-b">
        <span class="text-lg font-semibold" data-qa="panel-title">{{ resolvedPanelTitle() }}</span>
        <button
            mat-icon-button
            type="button"
            (click)="onClose()"
            aria-label="Close documentation panel"
            data-qa="close-panel-button">
            <i class="fa fa-angle-double-right" aria-hidden="true"></i>
        </button>
    </div>

    <div class="panel-content flex-1 overflow-y-auto p-6">
        @if (isLoadingDoc()) {
            <div class="flex justify-center p-8" data-qa="markdown-loading">
                <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
            </div>
        } @else if (getErrorMessage()) {
            <div class="error-container flex flex-col items-center justify-center gap-4 p-8" data-qa="markdown-error">
                <i class="fa fa-warning error-color text-4xl" aria-hidden="true"></i>
                <p class="text-base text-center wrap-anywhere">{{ getErrorMessage() }}</p>
            </div>
        } @else if (getStepDocumentation()) {
            <div class="markdown-content" data-qa="markdown-content">
                <markdown [data]="getStepDocumentation()!" ngPreserveWhitespaces></markdown>
            </div>
        } @else {
            <div class="empty-container flex flex-col items-center justify-center gap-4 p-8" data-qa="markdown-empty">
                <i class="fa fa-info-circle text-4xl opacity-50" aria-hidden="true"></i>
                <p class="text-base text-center opacity-70">No documentation available.</p>
            </div>
        }
    </div>
</div>
